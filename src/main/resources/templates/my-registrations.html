<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的报名 - 读书会</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<nav class="navbar"></nav>
<div class="container">
    <h1 class="page-title">我的报名</h1>
    <div id="registrationList" class="activity-list"></div>
</div>
<script src="/js/main.js"></script>
<script>
    Auth.check();
    const user = Auth.getUser();

    function loadList() {
        api(`/api/registration/my?userId=${user.id}`).then(res => {
            const list = document.getElementById('registrationList');
            if (!res.data || res.data.length === 0) {
                list.innerHTML = '<div class="empty-state">暂无报名记录</div>';
                return;
            }
            list.innerHTML = res.data.map(r => {
                const a = r.activity;
                if (!a) return '';
                const status = getCheckInStatus(a, r.checkedIn);
                return `
                        <div class="card activity-item">
                            <div class="activity-info">
                                <div class="card-title">${a.title} ${getTypeBadge(a.type)}</div>
                                <div class="card-meta">
                                    <span>时间：${formatDate(a.startTime)} ~ ${formatDate(a.endTime)}</span><br>
                                    <span>地点：${a.location || '待定'}</span> |
                                    <span>发起人：${a.creatorName}</span> |
                                    <span>报名时间：${formatDate(r.registerTime)}</span>
                                </div>
                            </div>
                            <div class="activity-actions">
                                <button class="btn btn-sm ${status.cls}" ${status.disabled ? 'disabled' : ''} onclick="checkIn(${a.id})">${status.text}</button>
                                <a href="/activity/${a.id}" class="btn btn-sm btn-secondary">查看详情</a>
                                <button class="btn btn-sm btn-danger" onclick="cancelReg(${a.id})">取消报名</button>
                            </div>
                        </div>
                    `;
            }).join('');
        });
    }

    async function checkIn(activityId) {
        const res = await api(`/api/checkin?activityId=${activityId}&userId=${user.id}`, { method: 'POST' });
        alert(res.msg);
        if (res.code === 200) loadList();
    }

    async function cancelReg(activityId) {
        if (!confirm('确定取消报名？')) return;
        const res = await api(`/api/registration?activityId=${activityId}&userId=${user.id}`, { method: 'DELETE' });
        alert(res.msg);
        loadList();
    }

    loadList();
</script>
</body>
</html>
