<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活动管理 - 读书会</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.show {
            display: flex;
        }
        .modal-content {
            background: white;
            border-radius: 8px;
            padding: 1.5rem;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--gray-200);
        }
        .modal-header h3 {
            margin: 0;
        }
        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--gray-600);
        }
        .modal-close:hover {
            color: var(--gray-800);
        }
        .registration-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem;
            border-bottom: 1px solid var(--gray-100);
        }
        .registration-item:last-child {
            border-bottom: none;
        }
        .registration-info {
            display: flex;
            flex-direction: column;
        }
        .registration-name {
            font-weight: 500;
        }
        .registration-time {
            font-size: 0.875rem;
            color: var(--gray-600);
        }
        .checkin-status {
            font-size: 0.75rem;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
        }
        .checkin-yes {
            background: #c6f6d5;
            color: #276749;
        }
        .checkin-no {
            background: var(--gray-100);
            color: var(--gray-600);
        }
    </style>
</head>
<body>
<nav class="navbar"></nav>
<div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem;">
        <h1 class="page-title" style="margin:0; border:none; padding:0;">活动管理</h1>
        <a href="/create-activity" class="btn btn-primary">发布新活动</a>
    </div>
    <p id="roleHint" style="color:var(--gray-600); margin-bottom:1rem;"></p>
    <div id="activityList" class="activity-list"></div>
</div>

<!-- 报名人员模态框 -->
<div class="modal-overlay" id="registrationModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalTitle">报名人员</h3>
            <button class="modal-close" onclick="closeModal()">&times;</button>
        </div>
        <div id="registrationList"></div>
    </div>
</div>

<script src="/js/main.js"></script>
<script>
    Auth.check();
    const user = Auth.getUser();
    const isAdmin = user.role === 'ADMIN';

    document.getElementById('roleHint').textContent = isAdmin
        ? '您是管理员，可以管理所有活动'
        : '您可以管理自己发布的活动';

    const url = isAdmin
        ? `/api/activity/admin/all?userId=${user.id}`
        : `/api/activity/my?userId=${user.id}`;

    api(url).then(res => {
        const list = document.getElementById('activityList');
        if (!res.data || res.data.length === 0) {
            list.innerHTML = '<div class="empty-state">暂无活动</div>';
            return;
        }
        list.innerHTML = res.data.map(a => `
                <div class="card activity-item">
                    <div class="activity-info">
                        <div class="card-title">${a.title} ${getTypeBadge(a.type)}</div>
                        <div class="card-meta">
                            <span>时间：${formatDate(a.startTime)}</span> |
                            <span>地点：${a.location || '待定'}</span> |
                            <span>报名人数：${a.currentParticipants}/${a.maxParticipants || '不限'}人</span>
                            ${isAdmin && a.creatorId !== user.id ? `<br><span style="color:var(--primary);">发布者：${a.creatorName}</span>` : ''}
                        </div>
                    </div>
                    <div class="activity-actions">
                        <button class="btn btn-sm btn-secondary" onclick="viewRegistrations(${a.id}, '${a.title.replace(/'/g, "\\'")}')">查看报名</button>
                        <a href="/activity/${a.id}" class="btn btn-sm btn-secondary">查看</a>
                        <a href="/edit-activity/${a.id}" class="btn btn-sm btn-primary">编辑</a>
                        <button class="btn btn-sm btn-danger" onclick="deleteActivity(${a.id})">删除</button>
                    </div>
                </div>
            `).join('');
    });

    async function viewRegistrations(activityId, activityTitle) {
        document.getElementById('modalTitle').textContent = `「${activityTitle}」报名人员`;
        document.getElementById('registrationList').innerHTML = '<div style="text-align:center;padding:1rem;">加载中...</div>';
        document.getElementById('registrationModal').classList.add('show');

        const res = await api(`/api/registration/activity/${activityId}?userId=${user.id}`);
        const listDiv = document.getElementById('registrationList');

        if (res.code !== 200) {
            listDiv.innerHTML = `<div style="text-align:center;padding:1rem;color:#c53030;">${res.msg}</div>`;
            return;
        }

        if (!res.data || res.data.length === 0) {
            listDiv.innerHTML = '<div style="text-align:center;padding:1rem;color:var(--gray-600);">暂无报名人员</div>';
            return;
        }

        listDiv.innerHTML = res.data.map(r => `
            <div class="registration-item">
                <div class="registration-info">
                    <span class="registration-name">${r.userName}</span>
                    <span class="registration-time">报名时间：${formatDate(r.registerTime)}</span>
                </div>
                <span class="checkin-status ${r.checkedIn ? 'checkin-yes' : 'checkin-no'}">
                    ${r.checkedIn ? '已签到' : '未签到'}
                </span>
            </div>
        `).join('');
    }

    function closeModal() {
        document.getElementById('registrationModal').classList.remove('show');
    }

    // 点击模态框外部关闭
    document.getElementById('registrationModal').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });

    async function deleteActivity(id) {
        if (!confirm('确定删除此活动？此操作不可恢复！')) return;
        try {
            const res = await fetch(`/api/activity/${id}?userId=${user.id}`, { method: 'DELETE' });
            const data = await res.json();
            if (data.code === 200) {
                alert('删除成功');
                location.reload();
            } else {
                alert(data.msg || '删除失败');
            }
        } catch (e) {
            alert('删除失败：' + e.message);
        }
    }
</script>
</body>
</html>
